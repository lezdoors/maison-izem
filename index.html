<style>
/* Hero — breeze animation styles */
.hero-breeze{position:relative;height:100vh;min-height:600px;display:flex;align-items:flex-end;overflow:hidden}
.hero-breeze .hero-base{position:absolute;inset:0;overflow:hidden}
.hero-breeze .hero-base video,.hero-breeze .hero-base img{display:block;width:104%;height:104%;margin:-2% 0 0 -2%;object-fit:cover;will-change:transform;animation:slowDrift 30s ease-in-out infinite alternate;filter:saturate(0.9) brightness(0.78)}
@keyframes slowDrift{0%{transform:scale(1.00) translate(0,0)}100%{transform:scale(1.02) translate(-8px,4px)}}
.hero-breeze .hero-ambient{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.hero-breeze .hero-ambient::before{content:"";position:absolute;width:50vw;height:55vh;border-radius:50%;background:radial-gradient(circle,rgba(255,245,220,0.09) 0%,rgba(255,245,220,0.03) 40%,transparent 70%);will-change:transform,opacity;animation:warmDrift 22s ease-in-out infinite alternate}
@keyframes warmDrift{0%{transform:translate(40vw,10vh);opacity:0.5}40%{opacity:1}70%{transform:translate(55vw,22vh);opacity:0.7}100%{transform:translate(45vw,30vh);opacity:0.85}}
.hero-breeze .hero-ambient::after{content:"";position:absolute;width:35vw;height:40vh;border-radius:50%;background:radial-gradient(circle,rgba(212,182,94,0.06) 0%,transparent 60%);will-change:transform,opacity;animation:brassGlow 28s ease-in-out infinite alternate}
@keyframes brassGlow{0%{transform:translate(55vw,20vh);opacity:0.3}100%{transform:translate(35vw,40vh);opacity:0.7}}
.hero-breeze .hero-dust{position:absolute;inset:0;pointer-events:none}
.hero-breeze .hero-overlay{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at center,transparent 25%,rgba(10,8,7,0.50) 100%),linear-gradient(180deg,rgba(10,8,7,0.25) 0%,rgba(10,8,7,0.02) 30%,rgba(10,8,7,0.85) 100%)}
.hero-breeze .hero-content{position:relative;z-index:10;max-width:1440px;width:100%;margin:0 auto;padding:0 48px 72px;display:grid;grid-template-columns:1.4fr 1fr;gap:48px;align-items:end}
@media(max-width:900px){.hero-breeze .hero-content{grid-template-columns:1fr;gap:24px;padding:0 20px 48px}}
.hero-breeze h1{font-family:var(--f-serif);font-weight:300;font-size:clamp(48px,8vw,120px);line-height:.9;letter-spacing:-.02em;color:var(--bone)}
.hero-breeze h1 em{font-style:italic;color:var(--brass)}
.hero-breeze .hero-sub{font-family:var(--f-serif);font-style:italic;font-size:19px;line-height:1.55;color:var(--parchment);max-width:42ch}
.hero-breeze .hero-stats{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid rgba(201,168,76,0.25);padding-top:16px;margin-top:20px}
.hero-breeze .stat-k{font-family:var(--f-mono);font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--brass)}
.hero-breeze .stat-v{font-family:var(--f-serif);font-style:italic;font-size:17px;color:var(--bone);margin-top:4px}
.hero-breeze .hero-cta{display:inline-flex;align-items:center;gap:10px;margin-top:28px;font-family:var(--f-mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink);background:var(--brass);padding:14px 28px;border:1px solid var(--brass);text-decoration:none;transition:all .3s ease}
.hero-breeze .hero-cta:hover{background:transparent;color:var(--brass)}
.hero-breeze .hero-cta .arrow{display:inline-block;width:18px;height:1px;background:currentColor;position:relative}
.hero-breeze .hero-cta .arrow::after{content:"";position:absolute;right:0;top:-3px;width:7px;height:7px;border-right:1px solid currentColor;border-top:1px solid currentColor;transform:rotate(45deg)}
.scroll-hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;display:flex;flex-direction:column;align-items:center;gap:6px}
.scroll-hint span{font-family:var(--f-mono);font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:var(--dim)}
.scroll-line{width:1px;height:24px;background:linear-gradient(180deg,var(--brass),transparent);animation:scrollPulse 2.5s ease-in-out infinite}
@keyframes scrollPulse{0%,100%{opacity:0.3;transform:scaleY(0.6)}50%{opacity:1;transform:scaleY(1)}}

/* Featured products section */
.home-featured{padding:120px 0;background:var(--night);border-top:1px solid var(--line)}
.home-featured .inner{max-width:1440px;margin:0 auto;padding:0 48px}
.home-featured .head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:56px;gap:24px;flex-wrap:wrap}
.home-featured h2{font-family:var(--f-serif);font-weight:300;font-size:clamp(36px,5vw,72px);line-height:1;letter-spacing:-.02em;color:var(--bone)}
.home-featured h2 em{font-style:italic;color:var(--brass)}
@media(max-width:900px){.home-featured{padding:80px 0}.home-featured .inner{padding:0 20px}}

/* Brand story */
.brand-story{padding:100px 48px;background:var(--ink);border-top:1px solid var(--line)}
.brand-story .inner{max-width:1440px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.brand-story .copy h2{font-family:var(--f-serif);font-weight:300;font-size:clamp(32px,4vw,56px);line-height:1;color:var(--bone);margin-bottom:24px}
.brand-story .copy h2 em{font-style:italic;color:var(--brass)}
.brand-story .copy p{font-size:16px;line-height:1.8;color:var(--parchment);font-weight:300;margin-bottom:16px}
@media(max-width:900px){.brand-story{padding:60px 20px}.brand-story .inner{grid-template-columns:1fr;gap:32px}}

/* Lifestyle gallery */
.lifestyle{padding:100px 0;background:var(--night);border-top:1px solid var(--line)}
.lifestyle .inner{max-width:1440px;margin:0 auto;padding:0 48px}
.lifestyle .head{margin-bottom:48px}
.lifestyle h2{font-family:var(--f-serif);font-weight:300;font-size:clamp(32px,4vw,56px);line-height:1;color:var(--bone)}
.lifestyle h2 em{font-style:italic;color:var(--brass)}
.lifestyle .mosaic{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:auto auto;gap:16px}
.lifestyle .mosaic .tile{position:relative;overflow:hidden;border:1px solid var(--line);background:var(--espresso)}
.lifestyle .mosaic .tile.wide{grid-column:span 2;aspect-ratio:16/9}
.lifestyle .mosaic .tile.tall{grid-row:span 2;aspect-ratio:3/5}
.lifestyle .mosaic .tile.sq{aspect-ratio:1/1}
.lifestyle .mosaic .tile img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.88) contrast(1.05) saturate(1.05);transition:transform 1.6s var(--ease-in-out)}
.lifestyle .mosaic .tile:hover img{transform:scale(1.06)}
.lifestyle .mosaic .tile .cap{position:absolute;bottom:0;left:0;right:0;padding:16px 18px;z-index:2;font-family:var(--f-mono);font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--brass);background:linear-gradient(transparent, rgba(10,8,7,.7))}
@media(max-width:900px){.lifestyle{padding:60px 0}.lifestyle .inner{padding:0 20px}.lifestyle .mosaic{grid-template-columns:1fr 1fr}.lifestyle .mosaic .tile.wide{grid-column:span 2}.lifestyle .mosaic .tile.tall{grid-row:span 1;aspect-ratio:4/5}}

/* Provenance rail */
.prov-rail{background:var(--ink);border-top:1px solid var(--line)}
.prov-rail .row{max-width:1440px;margin:0 auto;padding:0 48px;display:grid;grid-template-columns:repeat(4,1fr)}
.prov-rail .cell{padding:28px 24px;border-right:1px solid var(--line);position:relative;overflow:hidden}
.prov-rail .cell:last-child{border-right:0}
.prov-rail .cell .bg{position:absolute;inset:0;z-index:0;width:100%;height:100%;object-fit:cover;opacity:.32;filter:saturate(.7) brightness(.75)}
.prov-rail .cell::after{content:"";position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(10,8,7,.45) 0%,rgba(10,8,7,.82) 100%);pointer-events:none}
.prov-rail .cell h6,.prov-rail .cell p{position:relative;z-index:2}
.prov-rail .cell h6{font-family:var(--f-mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--brass);opacity:.95;margin-bottom:8px}
.prov-rail .cell p{font-family:var(--f-serif);font-size:18px;font-weight:300;color:var(--bone);line-height:1.3}
@media(max-width:900px){.prov-rail .row{grid-template-columns:1fr 1fr;padding:0 20px}.prov-rail .cell:nth-child(2){border-right:0}.prov-rail .cell:nth-child(-n+2){border-bottom:1px solid var(--line)}}
</style>
</head>
<body>

<div id="root"></div>

<script src="/supabase-client.js"></script>
<script src="/cart.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script type="text/babel" data-presets="react" src="/shared.js"></script>

<script type="text/babel" data-presets="react">
// ============ HERO WITH BREEZE ============
function Hero() {
  useEffect(() => {
    // Dust particles
    const canvas = document.getElementById('dustCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() {
      W = canvas.width = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    const COUNT = 24;
    const particles = [];
    for (let i = 0; i < COUNT; i++) {
      particles.push({
        x: Math.random() * (W || 1920),
        y: Math.random() * (H || 1080),
        r: 1 + Math.random() * 2,
        vx: (Math.random() - 0.5) * 0.2,
        vy: -(0.1 + Math.random() * 0.25),
        alpha: 0.1 + Math.random() * 0.2,
        pulse: Math.random() * Math.PI * 2,
        pulseSpeed: 0.004 + Math.random() * 0.01,
      });
    }
    let raf;
    function draw() {
      ctx.clearRect(0, 0, W, H);
      for (const p of particles) {
        p.x += p.vx; p.y += p.vy; p.pulse += p.pulseSpeed;
        if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
        if (p.x < -10) p.x = W + 10;
        if (p.x > W + 10) p.x = -10;
        const flicker = 0.5 + 0.5 * Math.sin(p.pulse);
        const a = p.alpha * flicker;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(212,182,94,${a})`;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * 3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(212,182,94,${a * 0.1})`;
        ctx.fill();
      }
      raf = requestAnimationFrame(draw);
    }
    draw();
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
  }, []);

  return (
    <section className="hero-breeze">
      <div className="hero-base">
        <video autoPlay muted loop playsInline poster="/media/hero/hero-riad-curtains.webp" disablePictureInPicture disableRemotePlayback preload="auto">
          <source src="/media/hero/hero-video-4k.mp4" type="video/mp4"/>
        </video>
      </div>
      <div className="hero-ambient"></div>
      <canvas className="hero-dust" id="dustCanvas"></canvas>
      <div className="hero-overlay"></div>

      <div className="hero-content">
        <div>
          <div className="eyebrow">Marrakech — Catalogue</div>
          <h1>Objects drawn<br/>from <em>the medina.</em></h1>
        </div>
        <div>
          <p className="hero-sub">
            Hand-forged brass, veg-tanned leather, cedar jointed without metal —
            each piece signed by the artisan who made it.
          </p>
          <div className="hero-stats">
            <div><div className="stat-k">Collection</div><div className="stat-v">8 objects</div></div>
            <div><div className="stat-k">Lead time</div><div className="stat-v">9 – 21 days</div></div>
          </div>
          <a className="hero-cta" href="/collection">Enter the catalogue <span className="arrow"></span></a>
        </div>
      </div>

      <div className="scroll-hint">
        <div className="scroll-line"></div>
        <span>Scroll</span>
      </div>
    </section>
  );
}

// ============ TICKER ============
function Ticker() {
  const items = ["Brass", "Bone", "Camel leather", "Atlas cedar", "Hand-pressed plaster", "Lacquer on wood", "Waxed linen", "Bronze casting", "Tannery Chouara", "Marrakech medina"];
  const stream = [...items, ...items, ...items];
  return (
    <div className="ticker">
      <div className="ticker-track">
        {stream.map((s, i) => <span className="it" key={i}>{s}</span>)}
      </div>
    </div>
  );
}

// ============ FEATURED PRODUCTS ============
function FeaturedProducts() {
  const [products, setProducts] = useState([]);

  useEffect(() => {
    SB.fetchFeaturedProducts()
      .then(data => setProducts(data))
      .catch(() => {
        // Fallback: show first 4 products
        SB.fetchProducts().then(all => setProducts(all.slice(0, 4)));
      });
  }, []);

  if (products.length === 0) return null;

  return (
    <section className="home-featured">
      <div className="inner">
        <div className="head">
          <Reveal>
            <div className="eyebrow" style={{marginBottom:16}}>Featured objects</div>
            <h2>From the <em>catalogue.</em></h2>
          </Reveal>
          <Reveal delay={200}>
            <a className="link-u" href="/collection">View the full collection →</a>
          </Reveal>
        </div>
        <div className="grid-dense">
          {products.slice(0, 4).map((p, i) => {
            const closed = p.status === 'closed' || p.edition_remaining === 0;
            return (
            <Reveal className="card" key={p.id} delay={i * 80}>
              <a href={`/product?p=${p.slug}`} style={{display:"block",color:"inherit"}}>
                <div className="media">
                  <img className="primary" src={SB.productImageUrl(p.images?.[0])} alt={p.title} loading={i < 2 ? "eager" : "lazy"}/>
                  {p.images?.[1] && (
                    <img className="alt" src={SB.productImageUrl(p.images[1])} alt="" loading="lazy"/>
                  )}
                  {closed && <div className="tag closed">Edition closed</div>}
                  {!closed && (
                    <button className="quickadd" onClick={(e) => {
                      e.preventDefault();
                      e.stopPropagation();
                      Cart.add(p);
                    }}>Add to cart</button>
                  )}
                </div>
                <div className="meta">
                  <div className="name">{p.title}</div>
                  <div className="price">{SB.formatPrice(p.price)}</div>
                </div>
              </a>
            </Reveal>
            );
          })}
        </div>
      </div>
    </section>
  );
}

// ============ LIFESTYLE GALLERY ============
function LifestyleGallery() {
  return (
    <section className="lifestyle">
      <div className="inner">
        <Reveal className="head">
          <div className="eyebrow" style={{marginBottom:16}}>In the home</div>
          <h2>Objects in <em>context.</em></h2>
        </Reveal>
        <div className="mosaic">
          <Reveal className="tile wide">
            <img src="/media/lifestyle/editorial-salon-sedari-01.webp" alt="Salon — Marrakech" loading="lazy"/>
            <div className="cap">Le salon — Marrakech</div>
          </Reveal>
          <Reveal className="tile sq" delay={100}>
            <img src="/media/lifestyle/editorial-lanterne-cuivre-01.jpg" alt="Pierced brass lantern" loading="lazy"/>
            <div className="cap">Lanterne — cuivre</div>
          </Reveal>
          <Reveal className="tile sq" delay={150}>
            <img src="/media/lifestyle/editorial-interieur-01.jpg" alt="Artisan engraving brass" loading="lazy"/>
            <div className="cap">Dinanderie — at the bench</div>
          </Reveal>
          <Reveal className="tile sq" delay={200}>
            <img src="/media/products/chouara-lifestyle-01.webp" alt="Chouara pouf" loading="lazy"/>
            <div className="cap">Chouara</div>
          </Reveal>
          <Reveal className="tile wide" delay={250}>
            <img src="/media/lifestyle/editorial-passage-01.jpg" alt="Brass pendants — Riad passage" loading="lazy"/>
            <div className="cap">Le passage — Riad</div>
          </Reveal>
        </div>
      </div>
    </section>
  );
}

// ============ BRAND STORY ============
function BrandStory() {
  return (
    <section className="brand-story">
      <div className="inner">
        <Reveal className="copy">
          <div className="eyebrow" style={{marginBottom:24}}>The house</div>
          <h2>A house since <em>1974.</em></h2>
          <p>
            Maison Izem is the catalogue of Atelier no 7 — craftsmen off a narrow street in the old medina of Marrakech. Cedar from Azrou. Bone from Souk el Khemis. Hides from Tannery Chouara.
          </p>
          <p>
            Nothing arrives that we have not touched first; nothing leaves that has not been signed.
          </p>
          <a className="btn ghost" href="/about" style={{marginTop:12}}>About the atelier <span className="arrow"/></a>
        </Reveal>
        <Reveal delay={200} style={{position:"relative",aspectRatio:"4/5",overflow:"hidden",background:"var(--espresso)",border:"1px solid var(--line)"}}>
          <img src="/media/hero/hero-warm-salon.webp" alt="The atelier" style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",filter:"brightness(.85) contrast(1.05) saturate(1.05)"}}/>
        </Reveal>
      </div>
    </section>
  );
}

// ============ PROVENANCE RAIL ============
function ProvenanceRail() {
  const cells = [
    { label:"Provenance", text:"Derb el Ferran, Marrakech medina.", img:"/media/products/kursi-royal-01.webp" },
    { label:"Circulation", text:"Numbered editions of 12 or 24.", img:"/media/products/nacre-octogonale-artisan-01.webp" },
    { label:"Lead time", text:"Nine days at the bench, one pair of hands.", img:"/media/products/dinandier-laque-01.webp" },
    { label:"Delivery", text:"Worldwide, in cotton & cedar.", img:"/media/products/saqayah-cuivre-01.webp" },
  ];
  return (
    <section className="prov-rail">
      <Reveal className="row">
        {cells.map((c, i) => (
          <div className="cell" key={i}>
            <img className="bg" src={c.img} alt="" loading="lazy"/>
            <h6>— {c.label}</h6>
            <p>{c.text}</p>
          </div>
        ))}
      </Reveal>
    </section>
  );
}

// ============ SERVICES ============
function Services() {
  const rows = [
    { ic:"i",   t:"Insured worldwide delivery", s:"Cotton & cedar crate" },
    { ic:"ii",  t:"Certificate of edition", s:"Signed, dated, numbered" },
    { ic:"iii", t:"Lifetime repair at bench", s:"By the hand that made it" },
    { ic:"iv",  t:"30-day considered return", s:"No questions asked" },
  ];
  return (
    <section className="services">
      <div className="row">
        {rows.map((r, i) => (
          <div className="cell" key={i}>
            <div className="ic">{r.ic}</div>
            <div className="t">{r.t}<small>{r.s}</small></div>
          </div>
        ))}
      </div>
    </section>
  );
}

// ============ APP ============
function App() {
  return (
    <LangProvider>
      <Nav/>
      <Hero/>
      <Ticker/>
      <FeaturedProducts/>
      <LifestyleGallery/>
      <BrandStory/>
      <ProvenanceRail/>
      <Services/>
      <Footer/>
    </LangProvider>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
