<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" role="img" aria-label="Maison Izem — Marrakech">
  <style>
    .wm    { font-family: 'Cormorant Garamond','Bodoni 72',Didot,'Times New Roman',Georgia,serif;
             font-weight: 300; font-size: 64px; letter-spacing: 0.18em; fill: #1a1a1a; }
    .tag   { font-family: 'Inter Tight','Helvetica Neue',Helvetica,Arial,sans-serif;
             font-weight: 500; font-size: 13px; letter-spacing: 0.62em; fill: #1a1a1a; }
    .rule  { stroke: #1a1a1a; stroke-width: 1; }
  </style>
  <text class="wm"  x="300" y="100" text-anchor="middle">MAISON IZEM</text>
