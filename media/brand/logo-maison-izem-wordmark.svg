<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" role="img" aria-label="Maison Izem — Marrakech">
  <style>
    .wm-heavy { font-family: 'Inter Tight','Helvetica Neue',Helvetica,Arial,sans-serif;
                font-weight: 800; font-size: 76px; letter-spacing: -0.03em; fill: #1a1a1a; }
    .wm-light { font-family: 'Inter Tight','Helvetica Neue',Helvetica,Arial,sans-serif;
                font-weight: 400; font-size: 76px; letter-spacing: -0.03em; fill: #1a1a1a; }
    .tag      { font-family: 'Inter Tight','Helvetica Neue',Helvetica,Arial,sans-serif;
