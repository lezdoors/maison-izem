<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" role="img" aria-label="Maison Izem — Marrakech">
  <style>
    .mi-mono  { font-family: 'Inter Tight','Helvetica Neue',Helvetica,Arial,sans-serif;
                font-weight: 800; font-size: 84px; letter-spacing: -0.04em; fill: #1a1a1a; }
    .wm-heavy { font-family: 'Inter Tight','Helvetica Neue',Helvetica,Arial,sans-serif;
                font-weight: 800; font-size: 68px; letter-spacing: -0.03em; fill: #1a1a1a; }
    .wm-light { font-family: 'Inter Tight','Helvetica Neue',Helvetica,Arial,sans-serif;
                font-weight: 400; font-size: 68px; letter-spacing: -0.03em; fill: #1a1a1a; }
    .tag      { font-family: 'Inter Tight','Helvetica Neue',Helvetica,Arial,sans-serif;
                font-weight: 600; font-size: 12px; letter-spacing: 0.55em; fill: #1a1a1a; opacity: 0.7; }
    .ring     { fill: none; stroke: #1a1a1a; stroke-width: 1.5; }
  </style>
  <!-- mi monogram in ring -->
  <circle class="ring" cx="300" cy="84" r="62" />
  <text class="mi-mono" x="300" y="114" text-anchor="middle">mi</text>
  <!-- wordmark -->
  <text x="300" y="232" text-anchor="middle">
    <tspan class="wm-heavy">maison</tspan><tspan class="wm-light">izem</tspan>
  </text>
  <text class="tag" x="307" y="268" text-anchor="middle">MARRAKECH</text>
</svg>
