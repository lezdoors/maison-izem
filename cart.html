<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<title>Cart — Maison Izem</title>
<meta name="robots" content="noindex"/>
<meta property="og:site_name" content="Maison Izem"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Noto+Serif:ital,wght@1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
.cart-page{padding:140px 48px 80px;background:var(--ink);min-height:60vh}
.cart-page .inner{max-width:900px;margin:0 auto}
.cart-page h1{font-family:var(--f-serif);font-weight:300;font-size:clamp(40px,6vw,72px);line-height:.98;color:var(--bone);margin-bottom:40px}
.cart-page h1 em{font-style:italic;color:var(--brass)}
.cart-item{display:grid;grid-template-columns:100px 1fr auto;gap:24px;padding:24px 0;border-bottom:1px solid var(--line);align-items:center}
.cart-item .thumb{position:relative;aspect-ratio:4/5;background:var(--espresso);border:1px solid var(--line);overflow:hidden}
.cart-item .thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cart-item .details .name{font-family:var(--f-serif);font-size:20px;font-weight:300;color:var(--bone);margin-bottom:4px}
.cart-item .details .item-price{font-family:var(--f-mono);font-size:11px;letter-spacing:.18em;color:var(--oyster)}
.cart-item .controls{display:flex;flex-direction:column;align-items:flex-end;gap:12px}
.cart-item .qty{display:flex;align-items:center;gap:0;border:1px solid var(--line)}
.cart-item .qty button{width:32px;height:32px;font-family:var(--f-mono);font-size:14px;color:var(--bone);display:grid;place-items:center;transition:background .2s}
.cart-item .qty button:hover{background:var(--graphite)}
.cart-item .qty span{width:32px;height:32px;display:grid;place-items:center;font-family:var(--f-mono);font-size:12px;color:var(--bone);border-left:1px solid var(--line);border-right:1px solid var(--line)}
.cart-item .remove{font-family:var(--f-mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);cursor:pointer;transition:color .2s}
.cart-item .remove:hover{color:var(--lacquer)}
.cart-summary{padding:32px 0;display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap}
.cart-summary .total-label{font-family:var(--f-mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--dim)}
.cart-summary .total-val{font-family:var(--f-serif);font-size:36px;font-weight:300;color:var(--brass-hi);margin-top:4px}
.cart-error{font-family:var(--f-mono);font-size:11px;letter-spacing:.18em;color:var(--lacquer);margin-top:12px}
.empty-cart{padding:120px 0;text-align:center}
.empty-cart h2{font-family:var(--f-serif);font-weight:300;font-style:italic;font-size:clamp(36px,6vw,64px);color:var(--bone);margin-bottom:16px}
.empty-cart h2 em{color:var(--brass)}
.empty-cart p{font-family:var(--f-serif);font-size:19px;color:var(--parchment);max-width:38ch;margin:0 auto 32px;line-height:1.6}
@media(max-width:600px){
  .cart-page{padding:100px 20px 60px}
  .cart-item{grid-template-columns:80px 1fr;gap:16px}
  .cart-item .controls{grid-column:1/-1;flex-direction:row;align-items:center;justify-content:space-between}
}
</style>
</head>
<body>
<div id="root"></div>

<script src="/supabase-client.js"></script>
<script src="/cart.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script type="text/babel" data-presets="react" src="/shared.js"></script>

<script type="text/babel" data-presets="react">
function CartItem({item, onUpdate, onRemove}) {
  return (
    <div className="cart-item">
      <a href={`/product?p=${item.slug}`} className="thumb">
        <img src={SB.productImageUrl(item.image)} alt={item.title}/>
      </a>
      <div className="details">
        <a href={`/product?p=${item.slug}`} className="name">{item.title}</a>
        <div className="item-price">{SB.formatPrice(item.price)} each</div>
      </div>
      <div className="controls">
        <div className="qty">
          <button onClick={() => onUpdate(item.product_id, item.quantity - 1)} disabled={item.quantity <= 1}>-</button>
          <span>{item.quantity}</span>
          <button onClick={() => onUpdate(item.product_id, item.quantity + 1)}>+</button>
        </div>
        <div className="item-price" style={{fontFamily:"var(--f-serif)",fontSize:18,color:"var(--bone)"}}>
          {SB.formatPrice(item.price * item.quantity)}
        </div>
        <button className="remove" onClick={() => onRemove(item.product_id)}>Remove</button>
      </div>
    </div>
  );
}

function App() {
  const [items, setItems] = useState(Cart.get());
  const [checking, setChecking] = useState(false);
  const [error, setError] = useState("");

  useEffect(() => {
    const update = () => setItems(Cart.get());
    window.addEventListener("cart-updated", update);
    return () => window.removeEventListener("cart-updated", update);
  }, []);

  function handleUpdate(id, qty) {
    if (qty < 1) return;
    Cart.updateQty(id, qty);
  }

  function handleRemove(id) {
    Cart.remove(id);
  }

  async function handleCheckout() {
    setChecking(true);
    setError("");
    const cartItems = Cart.get();
    const total = cartItems.reduce((s, i) => s + (i.price * i.quantity), 0);
    window.dataLayer && window.dataLayer.push({
      event: 'begin_checkout',
      value: total / 100,
      currency: 'USD',
      items: cartItems.map(i => ({item_id: i.product_id, item_name: i.title, price: i.price / 100, quantity: i.quantity}))
    });
    try {
      const result = await SB.createCheckout(
        cartItems,
        window.location.origin + "/success?session_id={CHECKOUT_SESSION_ID}",
        window.location.origin + "/cart"
      );
      if (result.url) {
        window.location.href = result.url;
      }
    } catch (err) {
      setError(err.message || "Checkout failed. Please try again.");
      setChecking(false);
    }
  }

  const total = items.reduce((sum, i) => sum + (i.price * i.quantity), 0);

  return (
    <LangProvider>
      <Nav/>
      <section className="cart-page">
        <div className="inner">
          <Reveal>
            <h1>Your <em>cart.</em></h1>
          </Reveal>

          {items.length === 0 ? (
            <div className="empty-cart">
              <h2>The cart is <em>quiet.</em></h2>
              <p>Add a piece from the catalogue, or write to the atelier.</p>
              <a className="btn solid" href="/collection">Enter the collection <span className="arrow"/></a>
            </div>
          ) : (
            <>
              {items.map(item => (
                <CartItem key={item.product_id} item={item}
                  onUpdate={handleUpdate} onRemove={handleRemove}/>
              ))}

              <div className="cart-summary">
                <div>
                  <div className="total-label">Total</div>
                  <div className="total-val">{SB.formatPrice(total)}</div>
                </div>
                <div>
                  <button className="btn solid" onClick={handleCheckout} disabled={checking}>
                    {checking ? "Redirecting..." : "Proceed to checkout"} <span className="arrow"/>
                  </button>
                  {error && <div className="cart-error">{error}</div>}
                </div>
              </div>
            </>
          )}
        </div>
      </section>
      <Footer/>
    </LangProvider>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
