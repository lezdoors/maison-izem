<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<title>Collection — Perle de l'Atlas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Noto+Serif:ital,wght@1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div id="root"></div>

<script src="/supabase-client.js"></script>
<script src="/cart.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script type="text/babel" data-presets="react" src="/shared.js"></script>

<script type="text/babel" data-presets="react">
const CATEGORIES = [
  {id: "all", label: "All"},
  {id: "Poufs", label: "Poufs"},
  {id: "Tables", label: "Tables"},
  {id: "Lighting", label: "Lighting"},
  {id: "Furniture", label: "Furniture"},
];

const CAT_LABELS = {Poufs:"Poufs",Tables:"Tables",Lighting:"Lighting",Furniture:"Furniture"};

function ProductCard({product}) {
  const img1 = SB.productImageUrl(product.images?.[0]);
  const img2 = product.images?.[1] ? SB.productImageUrl(product.images[1]) : img1;
  return (
    <a className="card" href={`/product?p=${product.slug}`}>
      <div className="media">
        <img className="primary" src={img1} alt={product.title} loading="lazy"/>
        <img className="alt" src={img2} alt="" loading="lazy"/>
        <div className="lot">{CAT_LABELS[product.category] || product.category}</div>
        <button className="quickadd" onClick={(e) => {
          e.preventDefault();
          e.stopPropagation();
          Cart.add(product);
        }}>Add to cart</button>
      </div>
      <div className="meta">
        <div className="name">{product.title}</div>
        <div className="price">{SB.formatPrice(product.price)}</div>
      </div>
    </a>
  );
}

function App() {
  const [products, setProducts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [active, setActive] = useState("all");

  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const cat = params.get("cat");
    if (cat && CATEGORIES.find(c => c.id === cat)) {
      setActive(cat);
    }
  }, []);

  useEffect(() => {
    setLoading(true);
    SB.fetchProducts(active === "all" ? null : active)
      .then(data => { setProducts(data); setLoading(false); })
      .catch(err => { console.error(err); setLoading(false); });
  }, [active]);

  return (
    <LangProvider>
      <Nav/>

      <section style={{padding:"140px 0 40px",background:"var(--night)",borderBottom:"1px solid var(--line)"}}>
        <div style={{maxWidth:1440,margin:"0 auto",padding:"0 48px"}}>
          <Reveal>
            <div className="eyebrow" style={{marginBottom:24}}>The catalogue</div>
          </Reveal>
          <Reveal delay={100}>
            <h1 style={{fontFamily:"var(--f-serif)",fontWeight:300,fontSize:"clamp(56px,9vw,120px)",lineHeight:.92,letterSpacing:"-.02em",color:"var(--bone)"}}>
              The full <em style={{fontStyle:"italic",color:"var(--brass)"}}>collection.</em>
            </h1>
          </Reveal>
        </div>
      </section>

      <div className="toolbar floating">
        <div className="inner">
          <span className="label">Filter —</span>
          <div className="chips">
            {CATEGORIES.map(cat => (
              <button key={cat.id} className={`chip ${active===cat.id?"on":""}`}
                onClick={() => setActive(cat.id)}>
                {cat.label}
              </button>
            ))}
          </div>
          <span className="count">{loading ? "..." : `${products.length} pieces`}</span>
        </div>
      </div>

      <section className="collection" style={{paddingTop:60}}>
        <div className="inner">
          {loading ? (
            <div style={{textAlign:"center",padding:"80px 0",fontFamily:"var(--f-serif)",fontStyle:"italic",fontSize:22,color:"var(--dim)"}}>
              Loading the catalogue...
            </div>
          ) : products.length === 0 ? (
            <div style={{textAlign:"center",padding:"80px 0",fontFamily:"var(--f-serif)",fontStyle:"italic",fontSize:22,color:"var(--dim)"}}>
              No pieces in this category yet.
            </div>
          ) : (
            <div className="grid-dense">
              {products.map(p => <ProductCard key={p.id} product={p}/>)}
            </div>
          )}
        </div>
      </section>

      <Footer/>
    </LangProvider>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
