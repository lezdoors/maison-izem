<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<title>Object — Perle de l'Atlas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Noto+Serif:ital,wght@1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
.pdp{padding:120px 48px 80px;background:var(--ink)}
.pdp .inner{max-width:1440px;margin:0 auto;display:grid;grid-template-columns:1.1fr 1fr;gap:60px}
@media(max-width:1000px){.pdp{padding:100px 20px 60px}.pdp .inner{grid-template-columns:1fr;gap:40px}}
.pdp .crumbs{font-family:var(--f-mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--dim);margin-bottom:20px}
.pdp .crumbs a{color:var(--brass)}
.pdp .crumbs a:hover{color:var(--brass-hi)}
.gallery{display:flex;flex-direction:column;gap:14px}
.gallery .main{position:relative;aspect-ratio:4/5;background:var(--espresso);border:1px solid var(--line);overflow:hidden}
.gallery .main img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity .4s var(--ease)}
.gallery .thumbs{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.gallery .thumbs button{position:relative;aspect-ratio:1/1;background:var(--espresso);border:1px solid var(--line);overflow:hidden;cursor:pointer;padding:0;transition:border-color .3s var(--ease)}
.gallery .thumbs button:hover{border-color:var(--line-brass)}
.gallery .thumbs button.on{border-color:var(--brass)}
.gallery .thumbs img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.pdp .info{padding-top:8px;display:flex;flex-direction:column;gap:24px}
.pdp .info h1{font-family:var(--f-serif);font-weight:300;font-size:clamp(40px,5.5vw,72px);line-height:.98;letter-spacing:-.018em;color:var(--bone)}
.pdp .info h1 em{font-style:italic;color:var(--brass)}
.pdp .info .lede{font-family:var(--f-serif);font-style:italic;font-size:19px;line-height:1.5;color:var(--parchment);max-width:46ch}
.pdp .info .price-row{display:flex;align-items:baseline;gap:14px;border-top:1px solid var(--line-brass);border-bottom:1px solid var(--line);padding:18px 0}
.pdp .info .price-row .v{font-family:var(--f-serif);font-size:32px;color:var(--brass-hi);font-weight:300}
.pdp .info .price-row small{font-family:var(--f-mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--dim)}
.pdp .info .specs{display:grid;grid-template-columns:1fr;gap:0}
.pdp .info .specs .row{display:grid;grid-template-columns:140px 1fr;gap:18px;padding:12px 0;border-bottom:1px solid var(--line-soft);align-items:baseline}
.pdp .info .specs .row .k{font-family:var(--f-mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--brass);opacity:.85}
.pdp .info .specs .row .val{font-family:var(--f-serif);font-size:16px;color:var(--bone)}
.pdp .info .actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
.pdp .info .actions .btn{flex:1;justify-content:center;min-width:140px}
.pdp .info .promise{font-family:var(--f-serif);font-style:italic;font-size:14px;color:var(--dim);margin-top:8px}
.pdp .added-msg{font-family:var(--f-mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--brass);padding:12px 0;animation:fadeIn .4s}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media(max-width:600px){
  .pdp .info .specs .row{grid-template-columns:1fr;gap:4px;padding:14px 0}
  .pdp .info .price-row{padding:14px 0}
  .pdp .info .price-row .v{font-size:28px}
  .pdp .info h1{font-size:clamp(36px,9vw,52px)}
  .gallery .thumbs{grid-template-columns:repeat(4,1fr);gap:6px}
}
.related{padding:60px 48px 120px;background:var(--night);border-top:1px solid var(--line)}
.related .inner{max-width:1440px;margin:0 auto}
.related .head{display:flex;justify-content:space-between;align-items:end;margin-bottom:32px;gap:18px}
.related h3{font-family:var(--f-serif);font-weight:300;font-size:clamp(28px,3.5vw,44px);color:var(--bone);letter-spacing:-.01em}
.related h3 em{font-style:italic;color:var(--brass)}
.notfound{padding:200px 48px;text-align:center;color:var(--bone)}
.notfound h1{font-family:var(--f-serif);font-style:italic;font-size:80px;color:var(--brass);margin-bottom:20px}
</style>
</head>
<body>
<div id="root"></div>

<script src="/supabase-client.js"></script>
<script src="/cart.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script type="text/babel" data-presets="react" src="/shared.js"></script>

<script type="text/babel" data-presets="react">
const CAT_LABELS = {Poufs:"Poufs",Tables:"Tables",Lighting:"Lighting",Furniture:"Furniture"};

function Gallery({images}) {
  const [i, setI] = useState(0);
  const main = SB.productImageUrl(images[i]);
  return (
    <div className="gallery">
      <div className="main">
        <img src={main} alt="" key={main}/>
      </div>
      <div className="thumbs">
        {images.slice(0,4).map((src, idx) => (
          <button key={src} className={i===idx?"on":""} onClick={()=>setI(idx)}>
            <img src={SB.productImageUrl(src)} alt="" loading="lazy"/>
          </button>
        ))}
      </div>
    </div>
  );
}

function Info({product}) {
  const [added, setAdded] = useState(false);
  const cat = CAT_LABELS[product.category] || product.category;

  function handleAdd() {
    Cart.add(product);
    setAdded(true);
    setTimeout(() => setAdded(false), 2500);
  }

  return (
    <div className="info">
      <div className="crumbs">
        <a href="/">Perle de l'Atlas</a> · <a href="/collection">Collection</a> · <span>{cat}</span>
      </div>
      <div className="eyebrow">Catalogue · {cat}</div>
      <h1>{product.title}</h1>
      {product.description && (
        <p className="lede">{product.description}</p>
      )}
      <div className="price-row">
        <span className="v">{SB.formatPrice(product.price)}</span>
        <small>Price — USD</small>
      </div>
      <div className="specs">
        {product.materials && (
          <div className="row"><span className="k">Materials</span><span className="val">{Array.isArray(product.materials) ? product.materials.join(", ") : product.materials}</span></div>
        )}
        {product.dimensions && (
          <div className="row"><span className="k">Dimensions</span><span className="val">{typeof product.dimensions === "object" ? Object.values(product.dimensions).join(" × ") : product.dimensions}</span></div>
        )}
        {product.craftsman_name && (
          <div className="row"><span className="k">Craftsman</span><span className="val">{product.craftsman_name}</span></div>
        )}
        <div className="row"><span className="k">Delivery</span><span className="val">Worldwide, insured</span></div>
      </div>
      <div className="actions">
        <button className="btn solid" onClick={handleAdd}>Add to cart <span className="arrow"/></button>
        <a className="btn ghost" href="mailto:atelier@perledelatlas.com">Write to atelier</a>
      </div>
      {added && (
        <div className="added-msg">Added to cart</div>
      )}
      <div className="promise">— Made to order. Dispatched within 14 days from Marrakech.</div>
    </div>
  );
}

function Related({product, allProducts}) {
  const others = allProducts.filter(p => p.category === product.category && p.id !== product.id).slice(0, 4);
  if (others.length === 0) return null;
  return (
    <section className="related">
      <div className="inner">
        <div className="head">
          <h3>Other <em>{(CAT_LABELS[product.category] || "").toLowerCase()}</em></h3>
          <a className="link-u" href={`/collection?cat=${product.category}`}>See all →</a>
        </div>
        <div className="grid-dense">
          {others.map(p => (
            <a className="card" href={`/product?p=${p.slug}`} key={p.id}>
              <div className="media">
                <img className="primary" src={SB.productImageUrl(p.images?.[0])} alt={p.title} loading="lazy"/>
              </div>
              <div className="meta">
                <div className="name">{p.title}</div>
                <div className="price">{SB.formatPrice(p.price)}</div>
              </div>
            </a>
          ))}
        </div>
      </div>
    </section>
  );
}

function NotFound() {
  return (
    <section className="notfound">
      <h1>Object not found</h1>
      <p style={{fontFamily:"var(--f-serif)",fontSize:18,color:"var(--parchment)",marginBottom:24}}>Perhaps it has been claimed, or the catalogue has moved on.</p>
      <a className="btn solid" href="/collection">Return to the catalogue <span className="arrow"/></a>
    </section>
  );
}

function App() {
  const [product, setProduct] = useState(null);
  const [allProducts, setAllProducts] = useState([]);
  const [loading, setLoading] = useState(true);

  const slug = new URLSearchParams(window.location.search).get("p");

  useEffect(() => {
    if (!slug) { setLoading(false); return; }
    Promise.all([
      SB.fetchProduct(slug),
      SB.fetchProducts()
    ]).then(([p, all]) => {
      setProduct(p);
      setAllProducts(all);
      if (p) document.title = `${p.title} — Perle de l'Atlas`;
      setLoading(false);
    }).catch(err => { console.error(err); setLoading(false); });
  }, [slug]);

  if (loading) return (
    <LangProvider>
      <Nav/>
      <div style={{padding:"200px 48px",textAlign:"center",fontFamily:"var(--f-serif)",fontStyle:"italic",fontSize:22,color:"var(--dim)"}}>
        Loading...
      </div>
    </LangProvider>
  );

  return (
    <LangProvider>
      <Nav/>
      {product ? (
        <>
          <section className="pdp">
            <div className="inner">
              <Gallery images={product.images || []}/>
              <Info product={product}/>
            </div>
          </section>
          <Related product={product} allProducts={allProducts}/>
        </>
      ) : <NotFound/>}
      <Footer/>
    </LangProvider>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
